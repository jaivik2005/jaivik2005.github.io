<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git & GitHub Mastery 🚀</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0f172a;
            --primary: #f05032; /* Git Orange */
            --secondary: #ffffff; /* GitHub White */
            --accent: #6e5494; /* GitHub Purple */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(240, 80, 50, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(110, 84, 148, 0.15) 0%, transparent 40%);
            animation: bgRotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes bgRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 10;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
        }

        /* The Card */
        .tutorial-card {
            display: block;
            text-decoration: none;
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            color: #fff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Hover Effects */
        .tutorial-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 0 30px rgba(240, 80, 50, 0.2),
                0 0 60px rgba(110, 84, 148, 0.2);
        }

        /* Inner Glow Gradient */
        .tutorial-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.06), transparent 40%);
            z-index: 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .tutorial-card:hover::before {
            opacity: 1;
        }

        /* Content Styling */
        .card-content {
            position: relative;
            z-index: 1;
        }

        .icons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .icon-box {
            font-size: 3.5rem;
            transition: transform 0.3s ease;
        }

        .git-icon { color: var(--primary); }
        .github-icon { color: var(--secondary); }

        .tutorial-card:hover .git-icon { transform: rotate(-10deg) scale(1.1); }
        .tutorial-card:hover .github-icon { transform: rotate(10deg) scale(1.1); }

        .plus {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        .feature-pills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }

        .pill {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .tutorial-card:hover .pill {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(240, 80, 50, 0.4);
        }

        .tutorial-card:hover .cta-btn {
            transform: scale(1.05);
            box-shadow: 0 15px 30px -5px rgba(110, 84, 148, 0.5);
        }

        .cta-btn i {
            transition: transform 0.3s ease;
        }

        .tutorial-card:hover .cta-btn i {
            transform: translateX(4px);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .icons-wrapper {
                margin-bottom: 1.5rem;
            }
            
            .icon-box {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Mobile Menu Overlay -->
    <div class="nav-menu-overlay"></div>


    <div class="container">
        <a href="GIT&GITHUB/index.html" class="tutorial-card">
            <div class="card-content">
                <div class="icons-wrapper">
                    <i class="fab fa-git-alt icon-box git-icon"></i>
                    <span class="plus">+</span>
                    <i class="fab fa-github icon-box github-icon"></i>
                </div>
                
                <h1>Git & GitHub Mastery</h1>
                <p>The ultimate guide to version control and collaboration. From your first commit to advanced team workflows.</p>
                
                <div class="feature-pills">
                    <span class="pill">Version Control</span>
                    <span class="pill">Branching</span>
                    <span class="pill">Pull Requests</span>
                    <span class="pill">CI/CD</span>
                    <span class="pill">Team Workflow</span>
                </div>

                <div class="cta-btn">
                    <span>Start Learning</span>
                    <i class="fas fa-arrow-right"></i>
                </div>
            </div>
        </a>
    </div>

    <!-- Mouse Tracking Script for Glow Effect -->
    <script>
        document.querySelector('.tutorial-card').addEventListener('mousemove', (e) => {
            const card = e.currentTarget;
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
        });
    </script>

    <!-- Living Icons Experience -->
    <script type="module" src="living_icons.js" defer></script>

</body>
</html>
